# Single-domain setup: this server serves the React build at / and proxies the
# API paths to the Django backend container (service name "backend" on the
# compose network). No CORS is involved because everything is same-origin.

server {
    listen 80;
    # "_" = default server: responds on any host (domain, LAN IP, localhost).
    # Switch to your domain once you have one (e.g. mrtime.xyz www.mrtime.xyz).
    server_name mrtime.xyz www.mrtime.xyz;

    client_max_body_size 20M;          # allow image uploads (banners/gallery)

    root /usr/share/nginx/html;
    index index.html;

    # --- Django static files (admin, drf-spectacular) ---
    location /static/ {
        alias /vol/static/;
        access_log off;
        expires 7d;
    }

    # --- User-uploaded media (served from the shared volume) ---
    location /media/ {
        alias /vol/media/;
        access_log off;
        expires 7d;
    }

    # --- API + auth + admin -> Django/Gunicorn ---
    location ~ ^/(api|auth|admin)/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- React SPA: serve built assets, fall back to index.html for routes ---
    location / {
        try_files $uri $uri/ /index.html;
    }
}

